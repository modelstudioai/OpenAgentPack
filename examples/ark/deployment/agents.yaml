version: "1"

# Ark — deployment example.
#
# Ark has no /deployments endpoint, so deployments are emulated: recorded locally
# during `apply` and materialized into a session when run. Server-side cron and
# outcome grading are not available (the schedule is informational only).

providers:
  ark:
    api_key: ${ARK_API_KEY}

defaults:
  provider: ark

environments:
  dev:
    config:
      type: cloud
      networking:
        type: unrestricted

agents:
  reporter:
    description: "Generates daily engineering reports"
    model: doubao-seed-2-1-pro-260628
    instructions: |
      You are an engineering reporter. Summarize recent activity into a concise
      daily report with an executive summary and key metrics.
    environment: dev
    tools:
      builtin: [read, glob, grep, web_search, web_fetch]

deployments:
  daily-report:
    agent: reporter
    description: "Daily report (emulated: materialized into a session on run)"
    schedule:
      expression: "0 9 * * *"
      timezone: UTC
    initial_events:
      - type: user.message
        content: "Summarize yesterday's commits and generate the daily report."
    # File resource with a local `source`: uploaded via the Files API at run time
    # and mounted for the materialized session.
    resources:
      - type: file
        source: ./data/report-template.md
        mount_path: /data/report-template.md
