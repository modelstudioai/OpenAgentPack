version: "1"

providers:
  ark:
    api_key: ${ARK_API_KEY}

defaults:
  provider: ark

environments:
  dev:
    config:
      type: cloud
      networking:
        type: unrestricted

skills:
  code-review:
    source: ./skills/code-review/
    description: "Structured code review with severity levels"

agents:
  reviewer:
    description: "Code review specialist"
    model: doubao-seed-2-1-pro-260628
    instructions: ./prompts/reviewer.md
    environment: dev
    tools:
      builtin: [read, glob, grep]
      permissions:
        read: allow
        glob: allow
        grep: allow
    skills: [code-review]
