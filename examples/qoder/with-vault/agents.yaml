version: "1"

# Qoder (Cloud Agents) — vault + credentials example.
#
# A vault holds MCP credentials (Qoder supports `static_bearer`) that an agent
# can reference by name. Unlike Bailian, Qoder requires at least one credential
# inline at creation time: on `agents apply` this creates the vault AND its
# credentials in a single `POST /api/v1/cloud/vaults` call; `agents destroy` removes
# it via `DELETE /vaults/{id}`.
#
# Credentials are read from .env in this directory (Bun auto-loads it):
#   QODER_PAT        — Qoder personal access token (Bearer)
#   MCP_BEARER_TOKEN — static bearer token for the downstream MCP server
providers:
  qoder:
    api_key: ${QODER_PAT}
    gateway: "https://api.qoder.com/api/v1/cloud"

defaults:
  provider: qoder

# A vault is a named bundle of credentials. Each credential authenticates the
# agent to a downstream MCP server. Qoder's credentials API accepts the
# `static_bearer` type over the `streamable_http` protocol.
vaults:
  secrets:
    display_name: Cli Secrets
    credentials:
      - name: mcp-token
        type: static_bearer
        mcp_server_url: "https://mcp.example.com/github"
        protocol: streamable_http
        access_token: ${MCP_BEARER_TOKEN}
