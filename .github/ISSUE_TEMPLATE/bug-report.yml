name: Bug Report
description: Report a bug in OpenAgentPack
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this has not been reported
          required: true
        - label: I am using the latest version of OpenAgentPack
          required: true

  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create agents.yaml with...
        2. Run `agents plan`
        3. See error...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    attributes:
      label: Version
      description: Output of `bun run --cwd packages/cli bin/agents.ts --version` or commit hash.
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Provider
      options:
        - Claude
        - Qoder
        - Bailian
        - Ark
        - Multiple providers
        - N/A
    validations:
      required: true

  - type: textarea
    attributes:
      label: Relevant config
      description: Paste your agents.yaml with secrets redacted.
      render: yaml

  - type: textarea
    attributes:
      label: Error output
      description: Full error message or stack trace.
      render: text
